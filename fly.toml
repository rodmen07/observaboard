# fly.toml — observaboard Django API
app = "observaboard-rodmen07"
primary_region = "iad"

[build]

[processes]
  web    = "gunicorn observaboard.wsgi:application --bind 0.0.0.0:8000 --workers 2"
  worker = "celery -A observaboard worker --loglevel=info --concurrency 2"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["web"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[deploy]
  release_command = "python manage.py migrate --noinput"

[env]
  PORT = "8000"
  DEBUG = "false"
  ALLOWED_HOSTS = "observaboard-rodmen07.fly.dev,localhost"
