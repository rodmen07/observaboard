[tool.ruff]
target-version = "py312"
line-length = 100
src = [".", "events", "dashboard", "observaboard"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "DJ",  # flake8-django
    "RUF", # ruff-specific rules
]
ignore = [
    "E501",   # line too long — handled by formatter
    "B904",   # raise from exc — too strict for existing code
    "RUF012", # ClassVar annotations — Django ModelAdmin/DRF patterns are exempt
]

[tool.ruff.lint.isort]
known-first-party = ["events", "dashboard", "observaboard"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
