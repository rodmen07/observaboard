name: Deploy to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "events/**"
      - "dashboard/**"
      - "observaboard/**"
      - "requirements.txt"
      - "Dockerfile"
      - "manage.py"
      - ".github/workflows/deploy-cloud-run.yml"
  workflow_dispatch:

# Cancel in-progress runs for the same branch to prevent concurrent deploys.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GCP_REGION: us-central1
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  SERVICE_NAME: observaboard

jobs:
  test:
    name: Lint and test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: observaboard_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Collect static files
        run: python manage.py collectstatic --noinput
        env:
          SECRET_KEY: test-secret-key-ci-only

      - name: Run tests
        run: pytest --cov --cov-report=xml -q
        env:
          SECRET_KEY: test-secret-key-ci-only
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/observaboard_test

  deploy:
    name: Deploy to Cloud Run
    needs: [test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for OIDC token exchange with GCP WIF

    steps:
      - uses: actions/checkout@v4

      - name: Validate deploy configuration
        id: deploy_config
        run: |
          if [ -z "${{ env.GCP_PROJECT_ID }}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping deploy: repository variable GCP_PROJECT_ID is not set."
            exit 0
          fi

          if [ -z "${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping deploy: repository secret GCP_WORKLOAD_IDENTITY_PROVIDER is not set."
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud
        if: steps.deploy_config.outputs.enabled == 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        if: steps.deploy_config.outputs.enabled == 'true'
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        if: steps.deploy_config.outputs.enabled == 'true'
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        if: steps.deploy_config.outputs.enabled == 'true'
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/microservices/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Resolve service URL and Cloud Tasks vars
        if: steps.deploy_config.outputs.enabled == 'true'
        run: |
          EVENT_STREAM_URL=$(gcloud run services describe event-stream-service \
            --region="${{ env.GCP_REGION }}" \
            --format='value(status.url)' 2>/dev/null || echo "")
          echo "EVENT_STREAM_URL=${EVENT_STREAM_URL}" >> "$GITHUB_ENV"

          SERVICE_URL=$(gcloud run services describe "${{ env.SERVICE_NAME }}" \
            --region="${{ env.GCP_REGION }}" \
            --format='value(status.url)' 2>/dev/null || echo "")
          echo "CLOUD_RUN_SERVICE_URL=${SERVICE_URL}" >> "$GITHUB_ENV"

      - name: Run migrations
        if: steps.deploy_config.outputs.enabled == 'true'
        run: |
          gcloud run jobs create "${{ env.SERVICE_NAME }}-migrate-${{ github.sha }}" \
            --image "$IMAGE" \
            --region "${{ env.GCP_REGION }}" \
            --service-account "${{ secrets.GCP_SERVICE_ACCOUNT }}" \
            --add-cloudsql-instances "${{ env.GCP_PROJECT_ID }}:${{ env.GCP_REGION }}:microservices-pg" \
            --set-secrets "DATABASE_URL=OBSERVABOARD_DATABASE_URL:latest,SECRET_KEY=OBSERVABOARD_SECRET_KEY:latest" \
            --set-env-vars "ALLOWED_HOSTS=localhost,DEBUG=false" \
            --command "python" \
            --args "manage.py,migrate,--noinput" \
            --max-retries 1 \
            --quiet
          gcloud run jobs execute "${{ env.SERVICE_NAME }}-migrate-${{ github.sha }}" \
            --region "${{ env.GCP_REGION }}" \
            --wait \
            --quiet

      - name: Provision gateway API key
        if: steps.deploy_config.outputs.enabled == 'true'
        run: |
          # Retrieve the API key from Secret Manager
          API_KEY=$(gcloud secrets versions access latest --secret="OBSERVABOARD_API_KEY" --project="${{ env.GCP_PROJECT_ID }}")
          
          gcloud run jobs create "${{ env.SERVICE_NAME }}-apikey-${{ github.sha }}" \
            --image "$IMAGE" \
            --region "${{ env.GCP_REGION }}" \
            --service-account "${{ secrets.GCP_SERVICE_ACCOUNT }}" \
            --add-cloudsql-instances "${{ env.GCP_PROJECT_ID }}:${{ env.GCP_REGION }}:microservices-pg" \
            --set-secrets "DATABASE_URL=OBSERVABOARD_DATABASE_URL:latest,SECRET_KEY=OBSERVABOARD_SECRET_KEY:latest" \
            --set-env-vars "ALLOWED_HOSTS=localhost,DEBUG=false" \
            --command "python" \
            --args "manage.py,create_gateway_api_key,--idempotent,--key,${API_KEY}" \
            --max-retries 1 \
            --quiet
          gcloud run jobs execute "${{ env.SERVICE_NAME }}-apikey-${{ github.sha }}" \
            --region "${{ env.GCP_REGION }}" \
            --wait \
            --quiet

      - name: Deploy to Cloud Run
        if: steps.deploy_config.outputs.enabled == 'true'
        run: |
          for attempt in 1 2 3; do
            gcloud run deploy "${{ env.SERVICE_NAME }}" \
              --image "$IMAGE" \
              --region "${{ env.GCP_REGION }}" \
              --platform managed \
              --port 8080 \
              --memory 512Mi \
              --cpu 1 \
              --min-instances 0 \
              --max-instances 3 \
              --service-account "${{ secrets.GCP_SERVICE_ACCOUNT }}" \
              --add-cloudsql-instances "${{ env.GCP_PROJECT_ID }}:${{ env.GCP_REGION }}:microservices-pg" \
              --set-secrets "DATABASE_URL=OBSERVABOARD_DATABASE_URL:latest,SECRET_KEY=OBSERVABOARD_SECRET_KEY:latest,EVENT_STREAM_JWT_SECRET=EVENT_STREAM_JWT_SECRET:latest" \
              --set-env-vars "^#^ALLOWED_HOSTS=observaboard-5gcrg4oiza-uc.a.run.app,localhost#DEBUG=false#CORS_ALLOWED_ORIGINS=${{ vars.CORS_ALLOWED_ORIGINS }}${EVENT_STREAM_URL:+#EVENT_STREAM_URL=${EVENT_STREAM_URL}}#CLOUD_TASKS_QUEUE=observaboard-classify#CLOUD_TASKS_SA_EMAIL=${{ secrets.GCP_SERVICE_ACCOUNT }}#CLOUD_RUN_SERVICE_URL=${CLOUD_RUN_SERVICE_URL}#GCP_PROJECT_ID=${{ env.GCP_PROJECT_ID }}#GCP_REGION=${{ env.GCP_REGION }}" \
              --quiet && break
            echo "::warning::Deploy attempt $attempt failed. Retrying in $((attempt * 20))s..."
            sleep $((attempt * 20))
          done

      - name: Allow unauthenticated access
        if: steps.deploy_config.outputs.enabled == 'true'
        run: |
          gcloud run services add-iam-policy-binding "${{ env.SERVICE_NAME }}" \
            --region "${{ env.GCP_REGION }}" \
            --member "allUsers" \
            --role "roles/run.invoker" \
            --quiet
