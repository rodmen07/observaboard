<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-950">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — Observaboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full flex items-center justify-center">
  <div class="w-full max-w-sm px-6">
    <div class="flex flex-col items-center mb-8">
      <svg class="w-10 h-10 text-indigo-400 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
      </svg>
      <h1 class="text-xl font-semibold text-white">Observaboard</h1>
      <p class="text-sm text-gray-500 mt-1">Sign in to your dashboard</p>
    </div>

    {% if form.errors %}
    <div class="mb-4 rounded-lg px-4 py-3 text-sm bg-red-900/50 text-red-300 border border-red-800">
      Invalid username or password.
    </div>
    {% endif %}

    <form method="post" class="space-y-4">
      {% csrf_token %}
      <div>
        <label for="id_username" class="block text-sm font-medium text-gray-300 mb-1.5">Username</label>
        <input type="text" name="username" id="id_username" autofocus required
               class="w-full rounded-lg bg-gray-900 border border-gray-700 px-3 py-2 text-sm text-white
                      placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
      </div>
      <div>
        <label for="id_password" class="block text-sm font-medium text-gray-300 mb-1.5">Password</label>
        <input type="password" name="password" id="id_password" required
               class="w-full rounded-lg bg-gray-900 border border-gray-700 px-3 py-2 text-sm text-white
                      placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
      </div>
      <button type="submit"
              class="w-full rounded-lg bg-indigo-600 px-4 py-2.5 text-sm font-medium text-white
                     hover:bg-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2
                     focus:ring-offset-gray-950 transition-colors">
        Sign in
      </button>
      {% if next %}
      <input type="hidden" name="next" value="{{ next }}">
      {% endif %}
    </form>
  </div>
</body>
</html>
